version: '3.8'

services:

  admin-iam-service:
    build:
      context: .
      dockerfile: development.Dockerfile
    image: microservices-workshop/admin-iam-service:dev
    restart: on-failure
    environment: &admin-env
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: eparts_development
    volumes:
      - ./microservices/admin/iam-service:/app/src
      - ./libs:/app/libs
      - C:/Mani/logfile:/app/logs

  admin-users-service:
    build:
      context: .
