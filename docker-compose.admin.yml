version: "3.3"

services:

  admin-iam-service:
    build:
      context: .
      dockerfile: development.Dockerfile
    image: microservices-workshop/admin-iam-service:dev
    restart: on-failure
    environment: &admin-env
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: admin
      DB_NAME: eparts_development
    volumes:
      - ./libs:/app/libs
      - ./assets:/app/assets
      - ./logs:/app/logs
      - ./microservices/admin/iam-service:/app/src

  admin-users-service:
    build:
      context: .
      dockerfile: development.Dockerfile
    image: microservices-workshop/admin-users-service:dev
    restart: on-failure
    environment: *admin-env
